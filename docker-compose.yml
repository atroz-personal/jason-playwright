services:
  db:
    image: mariadb:11.4
    container_name: wp-db
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${WORDPRESS_DB_NAME}
      MARIADB_USER: ${WORDPRESS_DB_USER}
      MARIADB_PASSWORD: ${WORDPRESS_DB_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10

  wordpress:
    build:
      context: .
      dockerfile: docker/wordpress/Dockerfile
    container_name: wp-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: ${WORDPRESS_DB_NAME}
      WORDPRESS_DB_USER: ${WORDPRESS_DB_USER}
      WORDPRESS_DB_PASSWORD: ${WORDPRESS_DB_PASSWORD}
      WORDPRESS_TABLE_PREFIX: ${WORDPRESS_TABLE_PREFIX}
      WORDPRESS_DEBUG: ${WORDPRESS_DEBUG}
      WORDPRESS_SITE_URL: ${WORDPRESS_SITE_URL}
      WORDPRESS_SITE_TITLE: ${WORDPRESS_SITE_TITLE}
      WORDPRESS_ADMIN_USER: ${WORDPRESS_ADMIN_USER}
      WORDPRESS_ADMIN_PASSWORD: ${WORDPRESS_ADMIN_PASSWORD}
      WORDPRESS_ADMIN_EMAIL: ${WORDPRESS_ADMIN_EMAIL}
      WORDPRESS_UPLOAD_MAX_FILESIZE: ${WORDPRESS_UPLOAD_MAX_FILESIZE}
      WORDPRESS_POST_MAX_SIZE: ${WORDPRESS_POST_MAX_SIZE}
      WORDPRESS_MEMORY_LIMIT: ${WORDPRESS_MEMORY_LIMIT}
    volumes:
      - wordpress_data:/var/www/html
    healthcheck:
      test:
        [
          "CMD",
          "php",
          "-r",
          "$$s=@fsockopen('127.0.0.1',9000); if (!$$s) exit(1); fclose($$s);"
        ]
      interval: 10s
      timeout: 5s
      retries: 12

  nginx:
    image: nginx:1.28-alpine
    container_name: wp-nginx
    restart: unless-stopped
    depends_on:
      wordpress:
        condition: service_healthy
    ports:
      - "8080:80"
    volumes:
      - wordpress_data:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  db_data:
  wordpress_data:
