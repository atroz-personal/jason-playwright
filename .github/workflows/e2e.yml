name: E2E

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  playwright:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Create runtime env file
        run: cp .env.example .env

      - name: Start WordPress stack
        run: docker compose up -d --build

      - name: Wait for WordPress
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:8080 >/dev/null; then
              exit 0
            fi
            sleep 10
          done
          docker compose ps
          docker compose logs
          exit 1

      - name: Fix WordPress writable directories
        run: |
          docker exec wp-app sh -lc 'mkdir -p /var/www/html/wp-content/uploads /var/www/html/wp-content/upgrade /var/www/html/wp-content/cache'
          UPLOAD_BASE=$(docker exec wp-app wp eval 'echo wp_upload_dir()["basedir"];' --allow-root --path=/var/www/html)
          docker exec wp-app sh -lc "mkdir -p \"$UPLOAD_BASE/fe-woo/certificates\""
          docker exec wp-app sh -lc 'chown -R www-data:www-data /var/www/html/wp-content'
          docker exec wp-app sh -lc 'find /var/www/html/wp-content -type d -exec chmod 775 {} \;'
          docker exec wp-app sh -lc 'find /var/www/html/wp-content -type f -exec chmod 664 {} \;'

      - name: Install npm dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps firefox

      - name: Create FE certificate file
        env:
          FE_CERTIFICATE_P12_B64: ${{ secrets.FE_CERTIFICATE_P12_B64 }}
        if: ${{ env.FE_CERTIFICATE_P12_B64 != '' }}
        run: |
          echo "$FE_CERTIFICATE_P12_B64" | base64 --decode > /tmp/fe-certificate.p12

      - name: Install FE plugin
        run: |
          docker cp plugins/plugin-factura-electronica/. wp-app:/var/www/html/wp-content/plugins/plugin-factura-electronica/
          docker exec wp-app wp plugin activate plugin-factura-electronica --allow-root --path=/var/www/html

      - name: Prime FE connection test state
        run: |
          docker exec wp-app wp option update fe_woo_last_connection_test_status success --allow-root --path=/var/www/html
          docker exec wp-app wp option update fe_woo_last_connection_test_time "$(date +%s)" --allow-root --path=/var/www/html

      - name: Run Playwright tests
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:8080
          WORDPRESS_ADMIN_USER: admin
          WORDPRESS_ADMIN_PASSWORD: changeme123
          FE_API_USERNAME: ${{ secrets.FE_API_USERNAME }}
          FE_API_PASSWORD: ${{ secrets.FE_API_PASSWORD }}
          FE_CERTIFICATE_PATH: /tmp/fe-certificate.p12
          FE_CERTIFICATE_PIN: ${{ secrets.FE_CERTIFICATE_PIN }}
        run: npm run test:e2e

      - name: List Playwright outputs
        if: always()
        run: |
          pwd
          ls -la
          ls -la playwright-report || true
          ls -la test-results || true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          if-no-files-found: ignore
          path: |
            playwright-report/
            test-results/

      - name: Print Docker logs on failure
        if: failure()
        run: docker compose logs

      - name: Stop WordPress stack
        if: always()
        run: docker compose down -v
